<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bog'lanish</title>
    <link rel="stylesheet" href="./call.css">
</head>
<body>
    <section class="call">
        <div class="container">
            <div class="call__wrapper">
                <div class="call__box">
                    <h1 class="call__title">Bizning web ilovamizni sotib olmoqchi bo'lsangiz ma'lumotlaringizni kiriting 🚀</h1>
                </div>
                <form class="call__form" action="#">
                    <input class="call__input" type="text" placeholder="Ismingiz" required>
                    <input class="call__input" type="text" placeholder="Familyangiz" required>
                    <input class="call__input" type="tel" placeholder="Telefon raqamingiz" required>
                    <button class="call__btn" type="submit">Yuborish</button>
                </form> 
            </div>
        </div>
    </section>
</body>
</html>
